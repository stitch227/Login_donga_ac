<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dong-A e-Class Login</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<canvas id="vortex"></canvas>
<div class="spline-scene-overlay"></div>

<div class="cursor"></div>

<div class="login-wrapper">
  <div class="login-card" id="glassCard">

    <div class="login-left">
      <img src="https://res.cloudinary.com/dzayipaad/image/upload/v1778791176/image01_javehh.png">
    </div>

    <div class="login-right">
      <div class="logo">DONG-A UNIVERSITY</div>
      <h2>e-Class 로그인</h2>

      <input type="text" placeholder="아이디">
      <input type="password" placeholder="비밀번호">

      <button>로그인</button>

      <p class="copyright">© Dong-A University</p>
    </div>
    <img src="https://res.cloudinary.com/dzayipaad/image/upload/v1778791241/logo6_aezwh1.png" class="floating-logo">

  </div>
</div>

<script src="js/script.js"></script>

</body>
</html>
